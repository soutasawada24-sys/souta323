<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ブロックブラスト・ドラッグ版</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #222; color: white; font-family: sans-serif; }
        #game-board { 
            display: grid; grid-template-columns: repeat(8, 45px); grid-template-rows: repeat(8, 45px); 
            gap: 4px; background: #444; padding: 10px; border-radius: 8px;
        }
        .cell { width: 45px; height: 45px; background: #333; border-radius: 4px; }
        .cell.filled { background: #00d4ff; transition: 0.2s; }
        .cell.hover { background: #555; } /* 重なっている時のガイド */

        #pieces-container { display: flex; margin-top: 30px; gap: 40px; }
        .piece-block { width: 40px; height: 40px; background: #ffcc00; border-radius: 4px; cursor: grab; }
    </style>
</head>
<body>
    <h1>Block Blast (Drag & Drop)</h1>
    <div id="game-board"></div>

    <div id="pieces-container">
        <div class="piece-block" draggable="true" id="p1"></div>
        <div class="piece-block" draggable="true" id="p2"></div>
        <div class="piece-block" draggable="true" id="p3"></div>
    </div>

    <script>
        const BOARD_SIZE = 8;
        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));

        // ボードの生成
        function createBoard() {
            const boardEl = document.getElementById('game-board');
            boardEl.innerHTML = '';
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (board[r][c] ? ' filled' : '');
                    cell.dataset.r = r;
                    cell.dataset.c = c;

                    // ドロップを受け入れる設定
                    cell.ondragover = (e) => { e.preventDefault(); cell.classList.add('hover'); };
                    cell.ondragleave = () => cell.classList.remove('hover');
                    cell.ondrop = (e) => {
                        e.preventDefault();
                        cell.classList.remove('hover');
                        placeBlock(r, c);
                    };
                    
                    boardEl.appendChild(cell);
                }
            }
        }

        // ブロックを置く処理
        function placeBlock(r, c) {
            if (board[r][c] === 0) {
                board[r][c] = 1;
                checkLines();
                createBoard();
            }
        }

        // 列消去
        function checkLines() {
            for (let r = 0; r < BOARD_SIZE; r++) {
                if (board[r].every(cell => cell === 1)) {
                    board[r] = Array(BOARD_SIZE).fill(0);
                }
            }
            // 縦列の消去も本来必要ですが、まずは横列のみ！
        }

        createBoard();
    </script>
</body>
</html>
