<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coral Grow - Deep Sea Puzzle</title>
    <style>
        :root {
            --bg-color: #001a33;
            --board-color: #002b4d;
            --accent-color: #00d4ff;
        }
        * { box-sizing: border-box; }
        body { 
            display: flex; flex-direction: column; align-items: center; 
            background: var(--bg-color); color: white; font-family: 'Verdana', sans-serif; 
            overflow: hidden; margin: 0; height: 100vh; justify-content: center; 
            user-select: none; touch-action: none;
        }
        #score-board { font-size: 28px; margin-bottom: 10px; color: var(--accent-color); text-shadow: 0 0 10px rgba(0,212,255,0.5); }
        
        #game-board { 
            display: grid; grid-template-columns: repeat(8, 45px); grid-template-rows: repeat(8, 45px); 
            gap: 4px; background: var(--board-color); padding: 12px; border-radius: 20px; 
            border: 4px solid #004080; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .cell { 
            width: 45px; height: 45px; background: rgba(255,255,255,0.05); 
            border-radius: 50% 50% 10% 10%; transition: all 0.3s ease;
        }
        
        /* サンゴのレベル別表現（色の深み） */
        .coral-1 { background: #ff7f50; box-shadow: 0 0 5px #ff7f50; transform: scale(0.8); }
        .coral-2 { background: #ff4500; box-shadow: 0 0 10px #ff4500; transform: scale(0.9); }
        .coral-3 { background: #dc143c; box-shadow: 0 0 15px #dc143c; transform: scale(1.0); border: 2px solid white; }
        
        .blue-1 { background: #7fffd4; box-shadow: 0 0 5px #7fffd4; transform: scale(0.8); }
        .blue-2 { background: #00ced1; box-shadow: 0 0 10px #00ced1; transform: scale(0.9); }
        .blue-3 { background: #008b8b; box-shadow: 0 0 15px #008b8b; transform: scale(1.0); border: 2px solid white; }

        .purple-1 { background: #e0b0ff; box-shadow: 0 0 5px #e0b0ff; transform: scale(0.8); }
        .purple-2 { background: #9370db; box-shadow: 0 0 10px #9370db; transform: scale(0.9); }
        .purple-3 { background: #4b0082; box-shadow: 0 0 15px #4b0082; transform: scale(1.0); border: 2px solid white; }

        .cell.preview { background: rgba(0, 212, 255, 0.3); border-radius: 50%; }

        #pieces-container { 
            display: flex; margin-top: 20px; justify-content: space-around; 
            align-items: center; width: 100%; max-width: 500px; height: 140px;
        }
        .piece { display: grid; gap: 4px; cursor: grab; }
        .dragging { position: fixed; z-index: 1000; pointer-events: none; transform: scale(1.2) translateY(-40px); opacity: 0.8; }
        
        .p-block { width: 40px; height: 40px; border-radius: 50%; }
        .p-empty { width: 40px; height: 40px; }

        .particle {
            position: absolute; width: 6px; height: 6px; border-radius: 50%;
            pointer-events: none; z-index: 100; animation: bubble 0.8s ease-out forwards;
        }
        @keyframes bubble {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        #game-over { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 20, 40, 0.95); padding: 30px; border-radius: 20px; text-align: center;
            border: 3px solid var(--accent-color); z-index: 2000; width: 320px;
        }
        button { background: var(--accent-color); border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="score-board">CORAL: <span id="score">0</span></div>
    <div id="game-board"></div>
    <div id="pieces-container"></div>

    <div id="game-over">
        <h2 style="color: #00d4ff;">海がいっぱいになりました</h2>
        <p>スコア: <span id="final-score" style="font-size:24px;">0</span></p>
        <button onclick="location.reload()">もういちど育てる</button>
    </div>

    <script type="module">
        // Firebase設定（ユーザー指定通り維持）
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4J_zWBM5eI8WtpU8mSk9LY5nZiOjj1BA",
            authDomain: "my-block-blast-ad0ec.firebaseapp.com",
            projectId: "my-block-blast-ad0ec",
            storageBucket: "my-block-blast-ad0ec.firebasestorage.app",
            messagingSenderId: "261578363804",
            appId: "1:261578363804:web:2378d6e59673465a332e59"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const BOARD_SIZE = 8;
        const CELL_SIZE = 45;
        const GAP = 4;
        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
        let score = 0;
        let currentPieces = [];

        const COLORS = ['coral', 'blue', 'purple'];
        const SHAPES = [
            [[1, 1]], [[1], [1]], [[1, 1], [1, 0]], [[1]], [[1, 1, 1]]
        ];

        function init() {
            createBoard();
            spawnPieces();
        }

        function createBoard() {
            const boardEl = document.getElementById('game-board');
            boardEl.innerHTML = '';
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const cell = document.createElement('div');
                    const data = board[r][c];
                    cell.className = 'cell' + (data ? ` ${data.color}-${data.level}` : '');
                    cell.id = `cell-${r}-${c}`;
                    boardEl.appendChild(cell);
                }
            }
        }

        function spawnPieces() {
            const container = document.getElementById('pieces-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
                const color = COLORS[Math.floor(Math.random() * COLORS.length)];
                const pieceEl = document.createElement('div');
                pieceEl.className = 'piece';
                pieceEl.style.gridTemplateColumns = `repeat(${shape[0].length}, 40px)`;
                shape.forEach(row => {
                    row.forEach(val => {
                        const b = document.createElement('div');
                        b.className = val ? `p-block ${color}-1` : 'p-empty';
                        pieceEl.appendChild(b);
                    });
                });
                addDragListeners(pieceEl, shape, color, i);
                container.appendChild(pieceEl);
                currentPieces[i] = { shape, color };
            }
            checkGameOver();
        }

        function placePiece(shape, r, c, color) {
            shape.forEach((row, i) => {
                row.forEach((val, j) => {
                    if (val) {
                        board[r + i][c + j] = { color, level: 1 };
                        createBubbles(r + i, c + j, color);
                    }
                });
            });
            
            // 成長と伝染のロジック
            growCorals();
            score += 10;
            updateScore();
            createBoard();
            checkSpringTide();
        }

        function growCorals() {
            let changed = true;
            while(changed) {
                changed = false;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (!board[r][c]) continue;
                        const current = board[r][c];
                        
                        // 隣接チェック
                        const neighbors = [[0,1],[0,-1],[1,0],[-1,0]];
                        neighbors.forEach(([dr, dc]) => {
                            const nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr][nc]) {
                                const target = board[nr][nc];
                                // 同じ色ならレベルアップ
                                if (current.color === target.color && current.level === target.level && current.level < 3) {
                                    current.level++;
                                    board[nr][nc] = null;
                                    changed = true;
                                    score += 20;
                                }
                                // レベルが高いサンゴが隣の別色を飲み込む
                                if (current.color !== target.color && current.level > target.level) {
                                    target.color = current.color;
                                    changed = true;
                                    score += 5;
                                }
                            }
                        });
                    }
                }
            }
        }

        function checkSpringTide() {
            const flat = board.flat().filter(v => v);
            if (flat.length > 50) { // 盤面がほぼ埋まったら大潮
                const colorCounts = {};
                flat.forEach(v => colorCounts[v.color] = (colorCounts[v.color] || 0) + 1);
                const maxColor = Object.keys(colorCounts).reduce((a, b) => colorCounts[a] > colorCounts[b] ? a : b);
                
                // 一番多い色を全消し
                for(let r=0; r<BOARD_SIZE; r++) {
                    for(let c=0; c<BOARD_SIZE; c++) {
                        if(board[r][c] && board[r][c].color === maxColor) {
                            createBubbles(r, c, maxColor);
                            board[r][c] = null;
                            score += 50;
                        }
                    }
                }
                setTimeout(createBoard, 300);
            }
        }

        function createBubbles(r, c, color) {
            const cell = document.getElementById(`cell-${r}-${c}`);
            const rect = cell.getBoundingClientRect();
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.background = 'white';
                p.style.left = (rect.left + 22) + 'px';
                p.style.top = (rect.top + 22) + 'px';
                p.style.setProperty('--dx', (Math.random() - 0.5) * 100 + 'px');
                p.style.setProperty('--dy', (Math.random() - 0.5) * 100 + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        // --- ドラッグ & システム系（Block Blastの仕組みを流用） ---
        function addDragListeners(el, shape, color, index) {
            const start = (e) => {
                e.preventDefault();
                const touch = e.touches ? e.touches[0] : e;
                const rect = el.getBoundingClientRect();
                const offsetX = touch.clientX - rect.left;
                const offsetY = touch.clientY - rect.top;
                const clone = el.cloneNode(true);
                clone.classList.add('dragging');
                document.body.appendChild(clone);
                el.style.visibility = 'hidden';

                const move = (ev) => {
                    const t = ev.touches ? ev.touches[0] : ev;
                    clone.style.left = (t.clientX - offsetX) + 'px';
                    clone.style.top = (t.clientY - offsetY) + 'px';
                    updatePreview(t.clientX - offsetX, t.clientY - offsetY - 40, shape);
                };

                const end = (ev) => {
                    const t = ev.changedTouches ? ev.changedTouches[0] : ev;
                    const pos = getBoardPos(t.clientX - offsetX, t.clientY - offsetY - 40);
                    if (pos && canPlace(shape, pos.r, pos.c)) {
                        placePiece(shape, pos.r, pos.c, color);
                        currentPieces[index] = null;
                        clone.remove();
                        if (currentPieces.every(p => p === null)) spawnPieces();
                    } else {
                        el.style.visibility = 'visible';
                        clone.remove();
                    }
                    clearPreview();
                    window.removeEventListener('mousemove', move);
                    window.removeEventListener('touchmove', move);
                    window.removeEventListener('mouseup', end);
                    window.removeEventListener('touchend', end);
                };
                window.addEventListener('mousemove', move);
                window.addEventListener('touchmove', move, {passive: false});
                window.addEventListener('mouseup', end);
                window.addEventListener('touchend', end);
            };
            el.addEventListener('mousedown', start);
            el.addEventListener('touchstart', start);
        }

        function getBoardPos(x, y) {
            const boardEl = document.getElementById('game-board');
            const rect = boardEl.getBoundingClientRect();
            const c = Math.round((x - rect.left - 12) / (CELL_SIZE + GAP));
            const r = Math.round((y - rect.top - 12) / (CELL_SIZE + GAP));
            if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE) return {r, c};
            return null;
        }

        function canPlace(shape, r, c) {
            for (let i = 0; i < shape.length; i++) {
                for (let j = 0; j < shape[i].length; j++) {
                    if (shape[i][j]) {
                        if (r + i >= BOARD_SIZE || c + j >= BOARD_SIZE || board[r + i][c + j]) return false;
                    }
                }
            }
            return true;
        }

        function updatePreview(x, y, shape) {
            clearPreview();
            const pos = getBoardPos(x, y);
            if (pos && canPlace(shape, pos.r, pos.c)) {
                shape.forEach((row, i) => {
                    row.forEach((val, j) => {
                        if (val) {
                            const cell = document.getElementById(`cell-${pos.r + i}-${pos.c + j}`);
                            if (cell) cell.classList.add('preview');
                        }
                    });
                });
            }
        }

        function clearPreview() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('preview'));
        }

        function checkGameOver() {
            let canMove = false;
            currentPieces.forEach(p => {
                if (!p) return;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) if (canPlace(p.shape, r, c)) canMove = true;
                }
            });
            if (!canMove && currentPieces.some(p => p !== null)) {
                document.getElementById('game-over').style.display = 'block';
                document.getElementById('final-score').innerText = score;
            }
        }

        function updateScore() { document.getElementById('score').innerText = score; }

        init();
    </script>
</body>
</html>
