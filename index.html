<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Block Blast - Advanced</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #121212; color: white; font-family: 'Segoe UI', sans-serif; touch-action: none; margin: 0; padding: 20px; }
        #score-board { font-size: 36px; margin: 10px; color: #00d4ff; font-weight: bold; text-shadow: 0 0 10px rgba(0,212,255,0.5); }
        #game-board { 
            display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); 
            gap: 4px; background: #2a2a2a; padding: 12px; border-radius: 12px; border: 4px solid #333;
        }
        .cell { width: 40px; height: 40px; background: #1a1a1a; border-radius: 4px; transition: 0.1s; }
        .cell.filled { background: #00d4ff; box-shadow: inset 0 0 12px rgba(255,255,255,0.4); }
        
        #pieces-container { 
            display: flex; margin-top: 40px; gap: 20px; min-height: 220px; 
            align-items: center; justify-content: center; width: 100%;
        }
        .piece { display: grid; gap: 4px; cursor: grab; padding: 10px; border-radius: 8px; transition: transform 0.2s; }
        .piece:active { transform: scale(1.1); opacity: 0.8; }
        .p-block { width: 35px; height: 35px; background: #ffcc00; border-radius: 4px; }
        .p-empty { width: 35px; height: 35px; }

        #game-over { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 40px; border-radius: 20px; text-align: center;
            border: 2px solid #ff3333; z-index: 100;
        }
        button { background: #00d4ff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="score-board">SCORE: <span id="score">0</span></div>
    <div id="game-board"></div>
    <div id="pieces-container"></div>

    <div id="game-over">
        <h2 style="color: #ff3333; font-size: 40px;">GAME OVER</h2>
        <p>最終スコア: <span id="final-score">0</span></p>
        <button onclick="location.reload()">もう一度プレイ</button>
    </div>

    <script>
        const BOARD_SIZE = 8;
        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let score = 0;

        // リクエストされた複雑な形
        const BASE_PIECES = [
            [[1, 1, 1], [1, 1, 1], [1, 1, 1]], // 3x3 四角
            [[1, 1, 1], [1, 1, 1]],            // 2x3 四角
            [[1, 1, 1, 1]],                   // 1x4 直線
            [[1, 1, 1, 1, 1]],                // 1x5 直線
            [[1, 1], [1, 1]],                 // 2x2 四角
            [[1, 1, 1], [0, 0, 1], [0, 0, 1]], // 大きなL字
            [[0, 1, 0], [1, 1, 1], [0, 1, 0]]  // 十字
        ];

        let currentPieces = [];

        function init() {
            createBoard();
            spawnPieces();
        }

        // 行列をランダムに回転させる関数
        function rotatePiece(matrix) {
            const rotations = Math.floor(Math.random() * 4);
            let result = matrix;
            for (let r = 0; r < rotations; r++) {
                result = result[0].map((_, colIndex) => result.map(row => row[colIndex]).reverse());
            }
            return result;
        }

        function createBoard() {
            const boardEl = document.getElementById('game-board');
            boardEl.innerHTML = '';
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (board[r][c] ? ' filled' : '');
                    cell.ondragover = (e) => e.preventDefault();
                    cell.ondrop = (e) => handleDrop(e, r, c);
                    boardEl.appendChild(cell);
                }
            }
        }

        function spawnPieces() {
            const container = document.getElementById('pieces-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                let type = BASE_PIECES[Math.floor(Math.random() * BASE_PIECES.length)];
                type = rotatePiece(type); // ランダム回転適用

                const pieceEl = document.createElement('div');
                pieceEl.className = 'piece';
                pieceEl.draggable = true;
                pieceEl.style.gridTemplateColumns = `repeat(${type[0].length}, 35px)`;
                
                type.forEach(row => {
                    row.forEach(val => {
                        const b = document.createElement('div');
                        b.className = val ? 'p-block' : 'p-empty';
                        pieceEl.appendChild(b);
                    });
                });

                pieceEl.ondragstart = (e) => {
                    e.dataTransfer.setData('pieceIdx', i);
                    e.dataTransfer.setData('type', JSON.stringify(type));
                };
                container.appendChild(pieceEl);
                currentPieces[i] = type;
            }
            checkGameOver();
        }

        function handleDrop(e, r, c) {
            e.preventDefault();
            const type = JSON.parse(e.dataTransfer.getData('type'));
            const idx = e.dataTransfer.getData('pieceIdx');

            if (canPlace(type, r, c)) {
                placePiece(type, r, c);
                document.getElementsByClassName('piece')[idx].style.visibility = 'hidden';
                currentPieces[idx] = null;
                
                checkAndClear();
                if (currentPieces.every(p => p === null)) spawnPieces();
                else checkGameOver();
            }
        }

        function canPlace(type, r, c) {
            for (let i = 0; i < type.length; i++) {
                for (let j = 0; j < type[i].length; j++) {
                    if (type[i][j]) {
                        if (r + i >= BOARD_SIZE || c + j >= BOARD_SIZE || board[r + i][c + j]) return false;
                    }
                }
            }
            return true;
        }

        function placePiece(type, r, c) {
            for (let i = 0; i < type.length; i++) {
                for (let j = 0; j < type[i].length; j++) {
                    if (type[i][j]) board[r + i][c + j] = 1;
                }
            }
            score += (type.flat().filter(v => v).length) * 2;
            updateScore();
            createBoard();
        }

        function checkAndClear() {
            let rowsToClear = [];
            let colsToClear = [];
            for (let r = 0; r < BOARD_SIZE; r++) if (board[r].every(v => v === 1)) rowsToClear.push(r);
            for (let c = 0; c < BOARD_SIZE; c++) {
                let count = 0;
                for (let r = 0; r < BOARD_SIZE; r++) if (board[r][c] === 1) count++;
                if (count === BOARD_SIZE) colsToClear.push(c);
            }
            rowsToClear.forEach(r => board[r] = Array(BOARD_SIZE).fill(0));
            colsToClear.forEach(c => { for (let r = 0; r < BOARD_SIZE; r++) board[r][c] = 0; });

            if (rowsToClear.length > 0 || colsToClear.length > 0) {
                score += (rowsToClear.length + colsToClear.length) * 100;
                updateScore();
                createBoard();
            }
        }

        function checkGameOver() {
            let possible = false;
            currentPieces.forEach(type => {
                if (!type) return;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (canPlace(type, r, c)) possible = true;
                    }
                }
            });

            if (!possible && currentPieces.some(p => p !== null)) {
                document.getElementById('game-over').style.display = 'block';
                document.getElementById('final-score').innerText = score;
            }
        }

        function updateScore() {
            document.getElementById('score').innerText = score;
        }

        init();
    </script>
</body>
</html>
