<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>簡易ブロックパズル</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #222; color: white; font-family: sans-serif; }
        #game-board { 
            display: grid; 
            grid-template-columns: repeat(8, 40px); 
            grid-template-rows: repeat(8, 40px); 
            gap: 2px; 
            background: #444; 
            padding: 5px; 
            border-radius: 4px;
        }
        .cell { width: 40px; height: 40px; background: #333; border-radius: 2px; }
        .cell.filled { background: #00d4ff; border: 1px solid #fff; }
        #pieces-container { display: flex; margin-top: 20px; gap: 20px; }
        .piece { display: grid; gap: 2px; cursor: grab; }
    </style>
</head>
<body>
    <h1>Block Blast Base</h1>
    <div id="game-board"></div>
    <div id="pieces-container">
        </div>

    <script>
        const BOARD_SIZE = 8;
        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));

        // ボードの描画
        function drawBoard() {
            const boardEl = document.getElementById('game-board');
            boardEl.innerHTML = '';
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (board[r][c] ? ' filled' : '');
                    boardEl.appendChild(cell);
                }
            }
        }

        // ライン消去のロジック（簡易版）
        function checkLines() {
            // 行のチェック
            for (let r = 0; r < BOARD_SIZE; r++) {
                if (board[r].every(cell => cell === 1)) {
                    board[r] = Array(BOARD_SIZE).fill(0);
                }
            }
            // 列のチェック（実際には列も同様にループ処理が必要）
            drawBoard();
        }

        drawBoard();
    </script>
</body>
</html>
