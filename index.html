<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coral Connection - 8x8 Sea Edition</title>
    <style>
        :root { 
            --bg: #001a33; 
            --board: rgba(0, 40, 80, 0.6); 
            --red: #ff5e78; 
            --blue: #33ccff; 
            --yellow: #ffd933; 
            --accent: #7df9ff; 
        }
        * { box-sizing: border-box; }
        body { 
            display: flex; flex-direction: column; align-items: center; 
            /* 海のようなグラデーション背景 */
            background: radial-gradient(circle at center, #003366 0%, #000b1a 100%);
            color: white; font-family: 'Helvetica Neue', Arial, sans-serif; 
            overflow: hidden; margin: 0; height: 100vh; justify-content: center; 
            user-select: none; touch-action: none;
        }
        
        #score-board { font-size: 28px; margin-bottom: 15px; color: var(--accent); font-weight: bold; text-shadow: 0 0 10px var(--accent); }
        
        /* 8x8のボード設定 */
        #game-board { 
            display: grid; 
            grid-template-columns: repeat(8, 40px); 
            grid-template-rows: repeat(8, 40px); 
            gap: 4px; background: var(--board); padding: 10px; border-radius: 12px; 
            border: 2px solid rgba(125, 249, 255, 0.3);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .cell { width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 4px; transition: background 0.2s; }
        
        /* サンゴのような光る色の設定 */
        .color-red { background: var(--red); box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 0 8px var(--red); }
        .color-blue { background: var(--blue); box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 0 8px var(--blue); }
        .color-yellow { background: var(--yellow); box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 0 8px var(--yellow); }
        .preview { background: rgba(255,255,255,0.2) !important; }

        /* 消去エフェクト（控えめ） */
        .blast { animation: blast-ani 0.3s ease-out forwards; }
        @keyframes blast-ani {
            0% { transform: scale(1); opacity: 1; filter: brightness(1.5); }
            100% { transform: scale(0.5); opacity: 0; }
        }

        #pieces-container { 
            display: flex; margin-top: 25px; justify-content: space-around; 
            align-items: center; width: 100%; max-width: 400px; height: 100px;
        }
        .piece { display: grid; gap: 2px; cursor: grab; transform: scale(0.8); }
        .dragging { position: fixed; z-index: 1000; pointer-events: none; transform: scale(1.0) translateY(-60px); opacity: 0.9; }
        .p-block { width: 35px; height: 35px; border-radius: 4px; }
        .p-empty { width: 35px; height: 35px; }

        #game-over, #ranking-screen { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 20, 40, 0.95); padding: 30px; border-radius: 20px; text-align: center;
            border: 2px solid var(--accent); z-index: 2000; width: 85%; max-width: 320px;
        }
        
        input { padding: 12px; width: 100%; border-radius: 8px; border: none; margin-bottom: 10px; background: #002b4d; color: white; border: 1px solid var(--accent); }
        button { background: var(--accent); border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; color: #001a33; margin-top: 5px; }

        #ranking-list { text-align: left; margin: 15px 0; list-style: none; padding: 0; max-height: 200px; overflow-y: auto; }
        #ranking-list li { padding: 8px 0; border-bottom: 1px solid rgba(125, 249, 255, 0.2); display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div id="score-board">SCORE: <span id="score">0</span></div>
    <div id="game-board"></div>
    <div id="pieces-container"></div>

    <div id="game-over">
        <h2 style="color: var(--accent);">GAME OVER</h2>
        <p>最終スコア: <span id="final-score" style="font-size:24px; font-weight:bold;">0</span></p>
        <input type="text" id="player-name" placeholder="なまえ" maxlength="8">
        <button id="save-btn">ランキングに保存</button>
        <button onclick="location.reload()" style="background:#444; color:white;">リトライ</button>
    </div>

    <div id="ranking-screen">
        <h2 style="color: var(--accent);">RANKING</h2>
        <ul id="ranking-list"></ul>
        <button onclick="location.reload()">閉じる</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4J_zWBM5eI8WtpU8mSk9LY5nZiOjj1BA",
            authDomain: "my-block-blast-ad0ec.firebaseapp.com",
            projectId: "my-block-blast-ad0ec",
            storageBucket: "my-block-blast-ad0ec.firebasestorage.app",
            messagingSenderId: "261578363804",
            appId: "1:261578363804:web:2378d6e59673465a332e59"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const SIZE = 8;
        let board = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
        let score = 0;
        let currentPieces = [null, null, null];

        const COLORS = ['red', 'blue', 'yellow'];
        const SHAPES = [
            [[1, 1], [1, 1]], // 2x2
            [[1, 1, 1]],      // 3x1
            [[1, 1], [1, 0]], // L
            [[1, 1, 1, 1]],   // 4x1
            [[0, 1], [1, 1], [0, 1]], // T
            [[1]]             // 1x1
        ];

        function init() {
            const boardEl = document.getElementById('game-board');
            boardEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    boardEl.appendChild(cell);
                }
            }
            spawnPieces();
        }

        function spawnPieces() {
            const container = document.getElementById('pieces-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
                const color = COLORS[Math.floor(Math.random() * COLORS.length)];
                const pieceEl = document.createElement('div');
                pieceEl.className = 'piece';
                pieceEl.style.gridTemplateColumns = `repeat(${shape[0].length}, 35px)`;
                
                shape.forEach(row => {
                    row.forEach(val => {
                        const b = document.createElement('div');
                        b.className = val ? `p-block color-${color}` : 'p-empty';
                        pieceEl.appendChild(b);
                    });
                });
                
                addDragListeners(pieceEl, shape, color, i);
                container.appendChild(pieceEl);
                currentPieces[i] = { shape, color };
            }
            if(!checkAnyMovePossible()) finishGame();
        }

        function placePiece(shape, r, c, color) {
            shape.forEach((row, ri) => {
                row.forEach((val, ci) => {
                    if (val) {
                        board[r + ri][c + ci] = color;
                        document.getElementById(`cell-${r + ri}-${c + ci}`).className = `cell color-${color}`;
                    }
                });
            });
            score += shape.flat().filter(v => v).length * 10;
            checkConnections();
            updateScore();
        }

        // つながり判定ロジック（横から横、または上から下のみ）
        function checkConnections() {
            let toRemove = new Set();
            
            COLORS.forEach(color => {
                // 垂直判定 (上端から下端)
                let visitedV = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
                for(let c=0; c<SIZE; c++) {
                    if(board[0][c] === color && !visitedV[0][c]) {
                        let cluster = [];
                        bfs(0, c, color, visitedV, cluster);
                        if(cluster.some(p => p.r === SIZE-1)) cluster.forEach(p => toRemove.add(`${p.r},${p.c}`));
                    }
                }
                
                // 水平判定 (左端から右端)
                let visitedH = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
                for(let r=0; r<SIZE; r++) {
                    if(board[r][0] === color && !visitedH[r][0]) {
                        let cluster = [];
                        bfs(r, 0, color, visitedH, cluster);
                        if(cluster.some(p => p.c === SIZE-1)) cluster.forEach(p => toRemove.add(`${p.r},${p.c}`));
                    }
                }
            });

            if (toRemove.size > 0) {
                toRemove.forEach(pos => {
                    const [r, c] = pos.split(',').map(Number);
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    cell.classList.add('blast');
                    board[r][c] = null;
                    setTimeout(() => { 
                        cell.className = 'cell'; 
                    }, 300);
                });
                score += toRemove.size * 100;
            }
        }

        function bfs(r, c, color, visited, cluster) {
            let queue = [{r, c}];
            visited[r][c] = true;
            let i = 0;
            while(i < queue.length) {
                let curr = queue[i++];
                cluster.push(curr);
                [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dr, dc]) => {
                    let nr = curr.r+dr, nc = curr.c+dc;
                    if(nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && !visited[nr][nc] && board[nr][nc] === color) {
                        visited[nr][nc] = true;
                        queue.push({r: nr, c: nc});
                    }
                });
            }
        }

        function addDragListeners(el, shape, color, index) {
            const start = (e) => {
                const touch = e.touches ? e.touches[0] : e;
                const rect = el.getBoundingClientRect();
                const offsetX = 20; // 中心付近を持つように固定
                const offsetY = 20;
                
                const clone = el.cloneNode(true);
                clone.classList.add('dragging');
                document.body.appendChild(clone);
                el.style.visibility = 'hidden';

                const move = (ev) => {
                    const t = ev.touches ? ev.touches[0] : ev;
                    clone.style.left = (t.clientX - offsetX) + 'px';
                    clone.style.top = (t.clientY - offsetY) + 'px';
                    // オフセット：指の上に見えるようにy座標を-60調整
                    updatePreview(t.clientX, t.clientY - 60, shape);
                };

                const end = (ev) => {
                    const t = ev.changedTouches ? ev.changedTouches[0] : ev;
                    const pos = getBoardPos(t.clientX, t.clientY - 60);
                    
                    if (pos && canPlace(shape, pos.r, pos.c)) {
                        placePiece(shape, pos.r, pos.c, color);
                        currentPieces[index] = null;
                        clone.remove();
                        if (currentPieces.every(p => p === null)) spawnPieces();
                        else if(!checkAnyMovePossible()) finishGame();
                    } else {
                        el.style.visibility = 'visible';
                        clone.remove();
                    }
                    clearPreview();
                    window.removeEventListener('mousemove', move);
                    window.removeEventListener('touchmove', move);
                    window.removeEventListener('mouseup', end);
                    window.removeEventListener('touchend', end);
                };
                window.addEventListener('mousemove', move);
                window.addEventListener('touchmove', move, {passive: false});
                window.addEventListener('mouseup', end);
                window.addEventListener('touchend', end);
            };
            el.addEventListener('mousedown', start);
            el.addEventListener('touchstart', start);
        }

        function getBoardPos(x, y) {
            const rect = document.getElementById('game-board').getBoundingClientRect();
            const cellSize = 44; // cell 40px + gap 4px
            const c = Math.floor((x - rect.left - 10) / cellSize);
            const r = Math.floor((y - rect.top - 10) / cellSize);
            if (r >= 0 && r < SIZE && c >= 0 && c < SIZE) return {r, c};
            return null;
        }

        function canPlace(shape, r, c) {
            for (let i = 0; i < shape.length; i++) {
                for (let j = 0; j < shape[i].length; j++) {
                    if (shape[i][j]) {
                        if (r + i >= SIZE || c + j >= SIZE || board[r + i][c + j]) return false;
                    }
                }
            }
            return true;
        }

        function updatePreview(x, y, shape) {
            clearPreview();
            const pos = getBoardPos(x, y);
            if (pos && canPlace(shape, pos.r, pos.c)) {
                shape.forEach((row, i) => {
                    row.forEach((val, j) => {
                        if (val) {
                            const cell = document.getElementById(`cell-${pos.r + i}-${pos.c + j}`);
                            if(cell) cell.classList.add('preview');
                        }
                    });
                });
            }
        }

        function clearPreview() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('preview'));
        }

        function updateScore() {
            document.getElementById('score').innerText = score;
        }

        function checkAnyMovePossible() {
            return currentPieces.some(p => {
                if(!p) return false;
                for(let r=0; r<SIZE; r++) {
                    for(let c=0; c<SIZE; c++) {
                        if(canPlace(p.shape, r, c)) return true;
                    }
                }
                return false;
            });
        }

        function finishGame() {
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = score;
        }

        async function saveScore() {
            const name = document.getElementById('player-name').value || "ななしのサンゴ";
            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.innerText = "通信中...";
            try {
                await addDoc(collection(db, "coral_rankings"), {
                    name, score, timestamp: new Date()
                });
                showRanking();
            } catch(e) { alert("エラー!"); btn.disabled = false; }
        }

        async function showRanking() {
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('ranking-screen').style.display = 'block';
            const list = document.getElementById('ranking-list');
            list.innerHTML = "ロード中...";
            const q = query(collection(db, "coral_rankings"), orderBy("score", "desc"), limit(10));
            const snap = await getDocs(q);
            let html = "";
            let rank = 1;
            snap.forEach(doc => {
                const data = doc.data();
                html += `<li><span>${rank}. ${data.name}</span><span>${data.score}</span></li>`;
                rank++;
            });
            list.innerHTML = html || "記録なし";
        }

        document.getElementById('save-btn').onclick = saveScore;
        init();
    </script>
</body>
</html>
